name: Sync Food Library

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   workflow_dispatch       admin clicks "Sync now" in the food-library UI;
#                           the worker dispatches this workflow with the
#                           run_id + staged + force inputs.
#   schedule (monthly cron) runs on the 1st of every month at 03:00 UTC.
#                           USDA's monthly publication cadence is the upper
#                           bound on useful sync frequency. Cron auto-
#                           generates a run_id so the UI can track it.
#
# This workflow runs ONE step: the unified orchestrator at scripts/sync/run.mjs.
# It replaces the older two-script flow (sync_usda.mjs + sync_on.mjs) with
# the bulk_import path (CSV download → parse → filter rules 1-14 → in-memory
# dedup rules 15-19 → diff → write). End-to-end identical to a fresh
# bulk_import, but with diff-based change detection so we don't wipe and
# rebuild every time.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full re-sync even if checksums match'
        required: false
        default: 'false'
      staged:
        description: 'Staged mode (true=write to changelog only, false=commit live)'
        required: false
        default: 'false'
      run_id:
        description: 'Sync run identifier (worker-generated; empty = cron auto-generates)'
        required: false
        default: ''

  schedule:
    - cron: '0 3 1 * *'   # 03:00 UTC on the 1st of every month

jobs:
  sync:
    name: Sync USDA + OpenNutrition → D1
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      CLOUDFLARE_API_TOKEN:   ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID:  ${{ secrets.CF_ACCOUNT_ID }}
      D1_DATABASE_ID:         ${{ secrets.D1_DATABASE_ID }}
      FOOD_ADMIN_KEY:         ${{ secrets.FOOD_ADMIN_KEY }}
      WORKER_URL:             https://myrx-food-search.motaz-jarrah.workers.dev
      SYNC_MODE:              ${{ github.event.inputs.staged == 'true' && 'staged' || 'commit' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Wrangler 4.x requires Node 22+. Bumped from 20 after a sync
          # run died in Phase 4 with "Wrangler requires at least Node.js
          # v22.0.0. You are using v20.20.2."
          node-version: '22'

      # Install dependencies for all three script folders.
      # - scripts/sync (orchestrator)
      # - scripts/bulk_import (loaders + filter rules invoked by orchestrator)
      # - scripts/d1_migrate (shared lib code — changelog recorder etc.)
      # Each folder has its own node_modules so Node's resolver finds the
      # right deps regardless of where the running .mjs file lives.
      - name: Install sync orchestrator dependencies
        working-directory: scripts/sync
        run: npm install

      - name: Install bulk_import dependencies
        working-directory: scripts/bulk_import
        run: npm ci || npm install

      - name: Install d1_migrate dependencies
        working-directory: scripts/d1_migrate
        run: npm ci || npm install

      # Install wrangler globally so `npx wrangler` resolves regardless of
      # which folder the orchestrator's CWD ends up in. (The bulk_import
      # d1_writer.mjs shells out via npx wrangler; without a global
      # install, npx would fetch on-demand each time which is slow.)
      - name: Install wrangler globally
        run: npm install -g wrangler@latest

      # Resolve run_id. Worker-dispatched runs already have it via inputs;
      # cron-triggered runs generate one and stamp it back into the worker.
      - name: Resolve run_id
        id: runid
        run: |
          if [ -n "${{ github.event.inputs.run_id }}" ]; then
            RUN_ID="${{ github.event.inputs.run_id }}"
            echo "Using worker-dispatched run_id: $RUN_ID"
          else
            TS=$(date -u +%Y%m%d%H%M%S)
            RAND=$(openssl rand -hex 4)
            RUN_ID="sync_${TS}_${RAND}"
            echo "Generated cron run_id: $RUN_ID"
            # Tell the worker about this run_id so the UI can track it.
            curl -fsS -X POST "$WORKER_URL/admin/sync/state" \
              -H "Authorization: Bearer $FOOD_ADMIN_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"run_id\":\"$RUN_ID\",\"mode\":\"commit\",\"status\":\"running\",\"started_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" || true
          fi
          echo "RUN_ID=$RUN_ID" >> $GITHUB_OUTPUT
          echo "SYNC_RUN_ID=$RUN_ID" >> $GITHUB_ENV

      # Mark running in the worker (also resets any prior cancel flag).
      - name: Mark sync started in D1
        run: |
          curl -fsS -X POST "$WORKER_URL/admin/sync/state" \
            -H "Authorization: Bearer $FOOD_ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"running\",\"run_id\":\"${{ steps.runid.outputs.RUN_ID }}\",\"started_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"error\":\"\",\"progress\":{}}" || true

      # ── Run the unified orchestrator ────────────────────────────────────────
      # The script handles: download (parallel) → parse → filter rules 1-14
      # → dedup rules 15-19 → diff → write (staged or commit) → finalise.
      # 8 GB heap is needed for the 2M+ row arrays during dedup.
      - name: Run sync orchestrator
        run: node --max-old-space-size=8192 scripts/sync/run.mjs

      # Worker's /admin/sync/state endpoint handles staged-vs-commit
      # bookkeeping: if mode='staged', it sets sync_staged_review=1 so the
      # UI shows the review dialog. If mode='commit', it records the run
      # as last_committed_run_id for undo support.
      - name: Mark sync completed in worker
        if: success()
        run: |
          curl -fsS -X POST "$WORKER_URL/admin/sync/state" \
            -H "Authorization: Bearer $FOOD_ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"completed\",\"run_id\":\"${{ steps.runid.outputs.RUN_ID }}\",\"mode\":\"$SYNC_MODE\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" || true

      - name: Mark sync failed in worker
        if: failure()
        run: |
          curl -fsS -X POST "$WORKER_URL/admin/sync/state" \
            -H "Authorization: Bearer $FOOD_ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failed\",\"run_id\":\"${{ steps.runid.outputs.RUN_ID }}\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"error\":\"Sync orchestrator exited non-zero — check GitHub Actions logs.\"}" || true
